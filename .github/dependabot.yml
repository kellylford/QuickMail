version: 2
updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    reviewers:
      - kellylford
    assignees:
      - kellylford
    groups:
      microsoft-identity:
        patterns:
          - "Microsoft.Identity.*"
      microsoft-data:
        patterns:
          - "Microsoft.Data.*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    reviewers:
      - kellylford
    assignees:
      - kellylford
