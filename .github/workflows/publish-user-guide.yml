name: Publish User Guide

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  publish-guide:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Read version from csproj
        id: version
        run: |
          VERSION=$(grep -oP '(?<=<Version>)[^<]+' QuickMail/QuickMail.csproj)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Create build directory
        run: mkdir -p build/docs

      - name: Write shared CSS
        run: |
          cat > /tmp/guide-style.html << 'STYLEEOF'
          <style>
            body { max-width: 860px; margin: 0 auto; padding: 1rem 2rem; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.6; color: #222; }
            h1 { border-bottom: 2px solid #ddd; padding-bottom: 0.3em; }
            h2 { border-bottom: 1px solid #eee; padding-bottom: 0.2em; margin-top: 2em; }
            table { border-collapse: collapse; width: 100%; margin: 1em 0; }
            th, td { border: 1px solid #ccc; padding: 0.5rem 0.75rem; text-align: left; }
            th { background: #f5f5f5; font-weight: 600; }
            code { background: #f0f0f0; padding: 0.15em 0.35em; border-radius: 3px; font-size: 0.88em; font-family: "Cascadia Code", "Consolas", monospace; }
            pre { background: #f0f0f0; padding: 1rem; border-radius: 4px; overflow-x: auto; }
            pre code { background: none; padding: 0; }
            a { color: #0969da; }
            hr { border: none; border-top: 1px solid #ddd; margin: 2rem 0; }
            blockquote { border-left: 3px solid #ddd; margin-left: 0; padding-left: 1rem; color: #555; }
            .nav { margin-bottom: 2em; padding-bottom: 0.75em; border-bottom: 1px solid #ddd; font-size: 0.9em; }
            .nav a { margin-right: 1em; color: #0969da; text-decoration: none; }
            .nav a:hover { text-decoration: underline; }
            .version { color: #666; font-size: 0.85em; margin-top: -1em; margin-bottom: 2em; }
          </style>
          STYLEEOF

      - name: Generate single-page HTML
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          pandoc docs/USER-GUIDE.md \
            --from markdown \
            --to html5 \
            --standalone \
            --include-in-header=/tmp/guide-style.html \
            --metadata title="QuickMail User Guide" \
            --metadata lang=en \
            --variable "version=$VERSION" \
            --output build/docs/full.html
          # Inject version line after the h1
          sed -i "s|<h1 class=\"title\">QuickMail User Guide</h1>|<h1 class=\"title\">QuickMail User Guide</h1><p class=\"version\">Version $VERSION</p>|" build/docs/full.html

      - name: Generate sectioned HTML with navigation
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          python3 - "$VERSION" << 'EOF'
          import re
          import os
          import subprocess
          import sys

          version = sys.argv[1]

          with open('docs/USER-GUIDE.md', 'r', encoding='utf-8') as f:
              content = f.read()

          with open('/tmp/guide-style.html', 'r', encoding='utf-8') as f:
              shared_css = f.read()

          # Split by top-level headers (## Title), skip the ## Contents section
          sections = re.split(r'^## ', content, flags=re.MULTILINE)

          section_files = []
          for section in sections[1:]:
              lines = section.split('\n', 1)
              title = lines[0].strip()
              body = lines[1] if len(lines) > 1 else ""

              # Skip the in-document Contents section (it's just anchor links)
              if title.lower() == 'contents':
                  continue

              filename = re.sub(r'[^\w\s-]', '', title).strip().lower().replace(' ', '-')
              section_files.append((filename, title, body))

          def make_nav(current_idx):
              nav = '<div class="nav"><a href="index.html">Contents</a> | <a href="full.html">Single Page</a>'
              if current_idx > 0:
                  prev_fn, prev_title, _ = section_files[current_idx - 1]
                  nav += f' | ← <a href="{prev_fn}.html">{prev_title}</a>'
              if current_idx < len(section_files) - 1:
                  next_fn, next_title, _ = section_files[current_idx + 1]
                  nav += f' | <a href="{next_fn}.html">{next_title}</a> →'
              nav += '</div>'
              return nav

          for i, (filename, title, body) in enumerate(section_files):
              section_md = f"# {title}\n\n{body}"
              result = subprocess.run(
                  ['pandoc', '--from', 'markdown', '--to', 'html5'],
                  input=section_md, capture_output=True, text=True
              )
              html = f"""<!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>{title} - QuickMail User Guide</title>
            {shared_css}
          </head>
          <body>
            {make_nav(i)}
            {result.stdout}
            {make_nav(i)}
          </body>
          </html>"""
              with open(f'build/docs/{filename}.html', 'w', encoding='utf-8') as f:
                  f.write(html)

          # Generate index / table of contents
          toc_items = '\n'.join(
              f'<li><a href="{fn}.html">{t}</a></li>'
              for fn, t, _ in section_files
          )
          index_html = f"""<!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>QuickMail User Guide</title>
            {shared_css}
          </head>
          <body>
            <h1>QuickMail User Guide</h1>
            <p class="version">Version {version}</p>
            <p>QuickMail is a keyboard and screen reader friendly email program for Windows.</p>
            <h2>Contents</h2>
            <ul>
          {toc_items}
            </ul>
            <hr>
            <p><a href="full.html">View as single page</a></p>
          </body>
          </html>"""
          with open('build/docs/index.html', 'w', encoding='utf-8') as f:
              f.write(index_html)

          print(f"Generated {len(section_files)} sections")
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/docs
