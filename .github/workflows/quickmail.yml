name: QuickMail

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # create the GitHub release
  id-token: write   # OIDC token azure/login exchanges for Azure creds (signing)

jobs:
  build:
    runs-on: windows-latest
    # Runs in the `azure-signing` environment so the OIDC token's subject is
    # repo:kellylford/QuickMail:environment:azure-signing, which the Azure
    # federated credential trusts (wildcard tag subjects aren't supported in this
    # tenant). This is ONLY a claim-matching mechanism, not a deployment gate — do
    # not add protection rules to this environment or every build, including PRs,
    # will require approval. Signing still only runs on v* tags (below).
    environment: azure-signing

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Write Google OAuth credentials
        shell: pwsh
        env:
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          @"
          namespace QuickMail.Services;
          public partial class GoogleOAuthService
          {
              private const string ClientId     = "$env:GOOGLE_CLIENT_ID";
              private const string ClientSecret = "$env:GOOGLE_CLIENT_SECRET";
          }
          "@ | Set-Content -Path "QuickMail/Services/GoogleOAuthService.Credentials.cs" -Encoding UTF8

      - name: Write bug-report credentials
        shell: pwsh
        env:
          BUG_REPORT_TOKEN: ${{ secrets.BUG_REPORT_TOKEN }}
        run: |
          @"
          namespace QuickMail.Services;
          public partial class BugReportService
          {
              private const string AppOwnedToken = "$env:BUG_REPORT_TOKEN";
          }
          "@ | Set-Content -Path "QuickMail/Services/BugReportService.Credentials.cs" -Encoding UTF8

      - name: Test
        shell: pwsh
        # PropertiesViewModelTests and ReportBugViewModelTests exercise real clipboard access
        # (Clipboard.SetText), which is unreliable on GitHub-hosted Windows runners — no
        # interactive desktop session backs the clipboard, so these intermittently throw
        # COMException("OpenClipboard Failed") or crash the whole test host on shutdown even
        # when every assertion passed. Excluded here; run them locally where clipboard access
        # is real.
        #
        # Pass/fail is decided from the trx result counters, not the `dotnet test` exit code.
        # WPF StaFact tests intermittently crash the xUnit host *after* every test has passed:
        # a leftover window's HWND receives a message once its owning STA thread is gone, so
        # MS.Win32.HwndSubclass.SubclassWndProc calls Thread.get_CurrentThread() and throws a
        # NullReferenceException. xUnit reports this as a "catastrophic failure" and exits
        # non-zero even though the trx records failed=0/error=0. That benign teardown crash must
        # not fail the release, but a genuine test failure (failed>0, error>0, or no tests run)
        # still must. Root-cause tracked in issue #211.
        run: |
          dotnet test QuickMail.Tests/QuickMail.Tests.csproj -c Release `
            --logger "trx;LogFileName=results.trx" `
            --filter "FullyQualifiedName!~PropertiesViewModelTests&FullyQualifiedName!~ReportBugViewModelTests"
          $testExit = $LASTEXITCODE
          $trx = "QuickMail.Tests/TestResults/results.trx"
          if (-not (Test-Path $trx)) {
            Write-Error "No trx produced at $trx (dotnet test exit=$testExit); failing."
            exit 1
          }
          [xml]$doc = Get-Content $trx
          $c = $doc.TestRun.ResultSummary.Counters
          $total  = [int]$c.total
          $passed = [int]$c.passed
          $failed = [int]$c.failed
          $errors = [int]$c.error
          Write-Host "trx counters: total=$total passed=$passed failed=$failed error=$errors (dotnet test exit=$testExit)"
          if ($total -le 0) {
            Write-Error "No tests were executed; failing."
            exit 1
          }
          if ($failed -gt 0 -or $errors -gt 0) {
            Write-Error "Real test failures detected: failed=$failed error=$errors."
            exit 1
          }
          if ($testExit -ne 0) {
            Write-Warning "dotnet test exited $testExit but all $passed tests passed (failed=0, error=0). Treating as the benign WPF STA test-host teardown crash (HwndSubclass.SubclassWndProc / Thread.get_CurrentThread NRE, issue #211)."
          }
          exit 0

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: QuickMail.Tests/TestResults/results.trx
          retention-days: 7

      - name: Publish
        # -warnaserror: CI fails on ANY compiler/analyzer warning so a warning can never
        # land on main or ship in a release. Local build.bat stays permissive for WIP;
        # this is the enforcement point. Keep the tree warning-free or the build breaks.
        run: dotnet publish QuickMail/QuickMail.csproj -c Release -o publish/ -warnaserror
        # PublishSingleFile, SelfContained, RuntimeIdentifier, ReadyToRun are set in .csproj

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: QuickMail-win-x64
          path: publish/QuickMail.exe
          if-no-files-found: error
          retention-days: 7

      # The release tag is the single source of truth for the Velopack package version.
      # It must be SemVer (vpk rejects 4-part versions) and must match all three csproj
      # version properties, which are set independently: <Version> feeds NuGet/display
      # conventions, but <AssemblyVersion> is what Helpers/AppVersion.Display actually
      # reads — it drives the About dialog, LastRunVersion tracking, and the portable-exe
      # update comparison. A partial bump would ship an app that mis-reports its version
      # and portable copies that perpetually announce the update they already have.
      - name: Verify tag matches csproj versions
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'.TrimStart('v')
          foreach ($prop in 'Version', 'AssemblyVersion', 'FileVersion') {
            $value = (Select-Xml -Path QuickMail/QuickMail.csproj -XPath "/Project/PropertyGroup/$prop").Node.InnerText
            if ($tag -ne $value) {
              throw "Tag version '$tag' does not match csproj <$prop> '$value'. Update the csproj or re-tag."
            }
          }

      - name: Install vpk
        if: startsWith(github.ref, 'refs/tags/v')
        run: dotnet tool install -g vpk

      # Fetch the previous release's Velopack assets so vpk pack can generate a delta
      # package. If this step is skipped or fails, packing still succeeds but ships a
      # full package only — updates work, just as larger downloads.
      # continue-on-error covers the first Velopack release, where the latest GitHub
      # release predates Velopack and has no assets for vpk to download.
      - name: Download previous release for delta generation
        if: startsWith(github.ref, 'refs/tags/v')
        continue-on-error: true
        shell: pwsh
        run: vpk download github --repoUrl https://github.com/kellylford/QuickMail --token ${{ secrets.GITHUB_TOKEN }} --outputDir installer/Output/Releases

      # --- Code signing (Azure Artifact Signing via GitHub OIDC) --------------
      # azure/login exchanges the workflow OIDC token for Azure creds; Velopack's
      # bundled signtool then authenticates through that `az` session
      # (DefaultAzureCredential). No signing cert or long-lived secret is stored.
      - name: Azure login (code signing)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # UTF-8 without BOM is required by Velopack's --azureTrustedSignFile reader;
      # [IO.File]::WriteAllText writes exactly that.
      - name: Write signing metadata
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $json = @{
            Endpoint               = 'https://eus.codesigning.azure.net/'
            CodeSigningAccountName = 'kellylford'
            CertificateProfileName = 'kellyford-public'
          } | ConvertTo-Json
          [System.IO.File]::WriteAllText("$env:GITHUB_WORKSPACE\signing-metadata.json", $json)

      # --shortcuts StartMenuRoot: Start Menu entry only, no desktop shortcut
      # (matches the previous installer's default).
      # --msi builds the wizard installer (welcome, license acceptance, conclusion pages)
      # that is the user-facing download; the one-click Setup.exe is also produced but
      # intentionally not shipped. --instLocation PerUser keeps the install in
      # %LocalAppData% so background updates never need elevation. vpk requires the
      # license file to carry a .txt/.md/.rtf extension, hence the copy.
      - name: Pack Velopack release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $version = '${{ github.ref_name }}'.TrimStart('v')
          Copy-Item LICENSE installer/velopack/license.txt
          # --azureTrustedSignFile signs the packaged app binaries, Velopack's
          # Update.exe / Setup bootstrapper, and the MSI as they are produced.
          vpk pack --packId QuickMail --packVersion $version --packDir publish `
            --mainExe QuickMail.exe --packTitle QuickMail --packAuthors "Kelly Ford" `
            --shortcuts StartMenuRoot --outputDir installer/Output/Releases `
            --framework webview2 `
            --azureTrustedSignFile "$env:GITHUB_WORKSPACE\signing-metadata.json" `
            --msi --instLocation PerUser `
            --instWelcome installer/velopack/welcome.txt `
            --instLicense installer/velopack/license.txt `
            --instConclusion installer/velopack/conclusion.txt
          # vpk always emits the MSI as QuickMail-win.msi with no version in the name, so a
          # downloaded installer is indistinguishable from any other version on disk. Rename
          # it to carry the release version (e.g. QuickMail-0.8.2-win.msi) so users can tell
          # versions apart in their Downloads folder. The version is only in the filename;
          # the MSI's internal ProductVersion is unchanged (vpk set it from --packVersion).
          Rename-Item installer/Output/Releases/QuickMail-win.msi "QuickMail-$version-win.msi"
          # The previous version's full .nupkg (fetched above as the delta input) stays in
          # the folder and is uploaded with the rest: vpk pack bakes an entry for every
          # package it saw into RELEASES/releases.win.json, so deleting the file would
          # publish feed metadata referencing an asset the release does not carry.

      # Sign the standalone portable exe that ships as its own release asset.
      # Velopack signed the copies inside the package/MSI during pack, but not
      # this pre-pack file, so it is signed after pack to avoid double-signing.
      - name: Sign portable QuickMail.exe
        if: startsWith(github.ref, 'refs/tags/v')
        uses: azure/artifact-signing-action@v2.0.0
        with:
          endpoint: https://eus.codesigning.azure.net/
          signing-account-name: kellylford
          certificate-profile-name: kellyford-public
          files-folder: ${{ github.workspace }}\publish
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      # Create a GitHub Release when a version tag is pushed (e.g. v1.2.0)
      # Release notes are read from docs/release-notes-<tag>.md if present,
      # otherwise GitHub auto-generates notes from commits.
      #
      # Uploaded assets serve two consumers:
      #  - people: QuickMail-<version>-win.msi (wizard installer with license acceptance)
      #    and QuickMail.exe (portable)
      #  - the in-app updater: RELEASES, releases.win.json, assets.win.json, and the
      #    .nupkg packages (full + delta), which Velopack's GithubSource reads from the
      #    latest release.
      # Intentionally not shipped: QuickMail-win-Setup.exe (one-click, no wizard/license)
      # and QuickMail-win-Portable.zip (the raw single-file QuickMail.exe remains the
      # portable download).
      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          name: QuickMail ${{ github.ref_name }}
          files: |
            publish/QuickMail.exe
            installer/Output/Releases/QuickMail-*-win.msi
            installer/Output/Releases/*.nupkg
            installer/Output/Releases/RELEASES
            installer/Output/Releases/releases.win.json
            installer/Output/Releases/assets.win.json
          # The paths above encode vpk's output naming (the MSI is renamed to add the
          # version, hence the glob); if a vpk upgrade renames an output, fail the release
          # instead of silently publishing without the installer or the update feed
          # (clients would then quietly stop seeing updates).
          fail_on_unmatched_files: true
          body_path: docs/release-notes-${{ github.ref_name }}.md
