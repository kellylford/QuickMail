name: QuickMail

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Test
        run: dotnet test QuickMail.Tests/QuickMail.Tests.csproj -c Release --logger "trx;LogFileName=results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: QuickMail.Tests/TestResults/results.trx

      - name: Publish
        run: dotnet publish QuickMail/QuickMail.csproj -c Release -o publish/
        # PublishSingleFile, SelfContained, RuntimeIdentifier, ReadyToRun are set in .csproj

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: QuickMail-win-x64
          path: publish/QuickMail.exe
          if-no-files-found: error

      - name: Install Inno Setup
        if: startsWith(github.ref, 'refs/tags/v')
        run: choco install innosetup --no-progress

      - name: Build installer
        if: startsWith(github.ref, 'refs/tags/v')
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\quickmail.iss'
        shell: pwsh

      # Create a GitHub Release when a version tag is pushed (e.g. v1.2.0)
      # Release notes are read from docs/release-notes-<tag>.md if present,
      # otherwise GitHub auto-generates notes from commits.
      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: QuickMail ${{ github.ref_name }}
          files: |
            publish/QuickMail.exe
            installer/Output/quickmail-v*-setup.exe
          body_path: docs/release-notes-${{ github.ref_name }}.md
