name: QuickMail

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Write Google OAuth credentials
        shell: pwsh
        env:
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          @"
          namespace QuickMail.Services;
          public partial class GoogleOAuthService
          {
              private const string ClientId     = "$env:GOOGLE_CLIENT_ID";
              private const string ClientSecret = "$env:GOOGLE_CLIENT_SECRET";
          }
          "@ | Set-Content -Path "QuickMail/Services/GoogleOAuthService.Credentials.cs" -Encoding UTF8

      - name: Write bug-report credentials
        shell: pwsh
        env:
          BUG_REPORT_TOKEN: ${{ secrets.BUG_REPORT_TOKEN }}
        run: |
          @"
          namespace QuickMail.Services;
          public partial class BugReportService
          {
              private const string AppOwnedToken = "$env:BUG_REPORT_TOKEN";
          }
          "@ | Set-Content -Path "QuickMail/Services/BugReportService.Credentials.cs" -Encoding UTF8

      - name: Test
        # PropertiesViewModelTests and ReportBugViewModelTests exercise real clipboard access
        # (Clipboard.SetText), which is unreliable on GitHub-hosted Windows runners — no
        # interactive desktop session backs the clipboard, so these intermittently throw
        # COMException("OpenClipboard Failed") or crash the whole test host on shutdown even
        # when every assertion passed. Excluded here; run them locally where clipboard access
        # is real.
        run: dotnet test QuickMail.Tests/QuickMail.Tests.csproj -c Release --logger "trx;LogFileName=results.trx" --filter "FullyQualifiedName!~PropertiesViewModelTests&FullyQualifiedName!~ReportBugViewModelTests"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: QuickMail.Tests/TestResults/results.trx
          retention-days: 7

      - name: Publish
        run: dotnet publish QuickMail/QuickMail.csproj -c Release -o publish/
        # PublishSingleFile, SelfContained, RuntimeIdentifier, ReadyToRun are set in .csproj

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: QuickMail-win-x64
          path: publish/QuickMail.exe
          if-no-files-found: error
          retention-days: 7

      - name: Install Inno Setup
        if: startsWith(github.ref, 'refs/tags/v')
        run: choco install innosetup --no-progress

      - name: Build installer
        if: startsWith(github.ref, 'refs/tags/v')
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\quickmail.iss'
        shell: pwsh

      # Create a GitHub Release when a version tag is pushed (e.g. v1.2.0)
      # Release notes are read from docs/release-notes-<tag>.md if present,
      # otherwise GitHub auto-generates notes from commits.
      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          name: QuickMail ${{ github.ref_name }}
          files: |
            publish/QuickMail.exe
            installer/Output/quickmail-v*-setup.exe
          body_path: docs/release-notes-${{ github.ref_name }}.md
