<h1 id="system-requirements">System Requirements</h1>
<ul>
<li>Windows 10 (1703 or later) or Windows 11</li>
<li>Microsoft Edge WebView2 Runtime (the installer checks for this
automatically)</li>
<li>An IMAP/SMTP email account (Gmail, Outlook.com, Microsoft 365, or
any standard IMAP provider)</li>
</ul>
