# MailGenerator — Credentials Template
# Copy this file to credentials.ini and fill in your values.
# credentials.ini is gitignored and will never be committed.

[imap]
host = mail.theideaplace.net
port = 993
username = testing@theideaplace.net
password = your-password

[smtp]
host = mail.theideaplace.net
port = 587
username = testing@theideaplace.net
password = your-password

[generator]
# Folder to append messages into (default: INBOX)
folder = INBOX
# Number of days back to spread message dates over
date_spread_days = 60
